<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Do you love me? | @coding.stella</title>
</head>
<body>

<div class="question-container container">
<img class="local-gif" src="Reply me love.jfif" alt="love question">
  <h2 class="question">Você vai se cuidar hoje?</h2>
  <div class="button-container">
    <button class="yes-btn btn js-yes-btn">Sim!</button>
    <button class="no-btn btn js-no-btn">Não.</button>
  </div>
</div>
<div class="result-container container">
  <img class="gif-result" src="Love me.jfif" alt="love result">
  <h3>Ta vendo? Você consegue! So precisa insistir bastante S2</h3>
</div>

<div class="cssload-main">
  <div class="cssload-heart">
    <span class="cssload-heartL"></span>
    <span class="cssload-heartR"></span>
    <span class="cssload-square"></span>
  </div>
  <div class="cssload-shadow"></div>
</div>
<script src="script.js"></script>

</body>
</html>
